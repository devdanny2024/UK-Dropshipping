version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uk2me
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/uk2me
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  backend-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: ["pnpm", "--filter", "@uk2me/backend", "worker"]
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/uk2me
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis


volumes:
  postgres_data:
